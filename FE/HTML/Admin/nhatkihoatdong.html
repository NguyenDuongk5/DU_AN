<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <title>Nhật ký hoạt động</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.css" rel="stylesheet">
    <link rel="stylesheet" href="../../CSS/project.css">
</head>
<body>

<div class="topbar">
    <div><i class="bi bi-person-circle"></i> Quản trị hệ thống</div>
    <button type="button" class="btn btn-danger" onclick="logout()">Đăng xuất</button>
</div>

<div class="sidebar">
    <a id="linkTrangChu"><i class="bi bi-house-door"></i> Trang chủ</a>
    <a id="linkQuanLiDuAn"><i class="bi bi-kanban"></i> Quản lí dự án</a>
    <a id="linkQuanLiNguoiDung"><i class="bi bi-people"></i> Quản lí người dùng</a>
    <a id="linkNhatKy" class="active"><i class="bi bi-journal-text"></i> Nhật ký hoạt động</a>
    <a id="LinkThongKe">
        <i class="bi bi-shield-lock"></i> Thống kê
    </a>
    <a id="linkCaiDat"><i class="bi bi-gear"></i> Cài đặt</a>
</div>

<div class="content-area">
    <div class="card shadow-sm p-3 mb-4">
        <form class="row g-3 align-items-end">
            <div class="col-md-4">
                <label class="form-label">Người dùng</label>
                <select id="userFilterSelect" class="form-select"></select>
            </div>
            <div class="col-md-2">
                <button type="button" class="btn btn-primary w-100" onclick="loadActivities()">Lọc</button>
            </div>
        </form>
    </div>

    <div class="card shadow-sm p-3">
        <table class="table table-hover">
            <thead class="table-primary">
                <tr>
                    <th>#</th>
                    <th>Người dùng</th>
                    <th>Email</th>
                    <th>Hành động</th>
                    <th>Thời gian</th>
                </tr>
            </thead>
            <tbody id="activityTableBody"></tbody>
        </table>
    </div>
</div>

<script src="../../JS/admin.js"></script>
</body>
</html>
